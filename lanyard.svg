<svg width="420" height="640" viewBox="0 0 420 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="strapGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#12B886"/>
      <stop offset="50%" stop-color="#00E5C7"/>
      <stop offset="100%" stop-color="#12B886"/>
    </linearGradient>
    <linearGradient id="shineSweep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="avatarRing" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#00E5C7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00E5C7" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect x="-130.0" y="0" width="260" height="340" rx="18"/>
    </clipPath>
  </defs>

  <!-- drop-in + pendulum swing group, pivoting around the clasp point -->
  <g transform="translate(210,0)">
    <animateTransform attributeName="transform" type="translate"
      values="210,-260; 210,0; 210,-14; 210,0"
      keyTimes="0;0.45;0.6;0.75"
      dur="1.6s" fill="freeze" calcMode="spline"
      keySplines="0.2 0.7 0.3 1;0.3 0 0.6 1;0.3 0 0.6 1"/>

    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0;16;-12;8;-6;4;-2.5;1.5;-3;3;-3"
        keyTimes="0;0.09;0.18;0.27;0.36;0.45;0.55;0.7;0.85;0.93;1"
        dur="1.55s" begin="1.6s" fill="freeze"
        calcMode="spline"
        keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum"
        values="0;3;0;-3;0" dur="4.4s" begin="3.15s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

      <!-- metal ring at top (clasp anchor) -->
      <circle cx="0" cy="8" r="10" fill="none" stroke="#B8C4CC" stroke-width="4"/>
      <circle cx="0" cy="8" r="10" fill="none" stroke="#00E5C7" stroke-width="1" opacity="0.5" filter="url(#glow)"/>

      <!-- teal fabric strap -->
      <path d="M -14,14 C -20,70 -20,120 -6,184 L 6,184 C 20,120 20,70 14,14 Z"
        fill="url(#strapGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <!-- strap printed text repeated -->
      <text x="0" y="90" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#ffffff" opacity="0.85" transform="rotate(90 0 90)">RR024 &#8226; AI Developer</text>
      <text x="0" y="170" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#ffffff" opacity="0.85" transform="rotate(90 0 170)">RR024 &#8226; AI Developer</text>

      <!-- metal clasp -->
      <rect x="-16" y="174" width="32" height="20" rx="5" fill="#C6D0D6" stroke="#8A9BA6" stroke-width="1.2"/>
      <rect x="-10" y="179" width="20" height="10" rx="3" fill="#8A9BA6"/>

      <!-- glassmorphism ID card -->
      <g transform="translate(0,190)">
        <rect x="-130.0" y="0" width="260" height="340" rx="18" fill="#0c1720" opacity="0.55"/>
        <rect x="-130.0" y="0" width="260" height="340" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1.4"/>

        <g clip-path="url(#cardClip)">
          <!-- header accent -->
          <rect x="-130.0" y="0" width="260" height="6" fill="url(#strapGrad)"/>

          <!-- avatar -->
          <circle cx="0" cy="70" r="46" fill="url(#avatarRing)"/>
          <circle cx="0" cy="70" r="38" fill="#0f1c26" stroke="#00E5C7" stroke-width="2"/>
          <path d="M -24,92 Q 0,58 24,92 Z" fill="#12B886" opacity="0.5"/>
          <circle cx="0" cy="60" r="16" fill="#00E5C7" opacity="0.3"/>
          <circle cx="0" cy="60" r="16" fill="none" stroke="#39FF14" stroke-width="1.2" opacity="0.7"/>
          <text x="0" y="118" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="8" fill="#C9D1D9" opacity="0.6">[ photo pending ]</text>

          <circle cx="0" cy="70" r="46" fill="none" stroke="#00E5C7" stroke-width="1.4" opacity="0.6">
            <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.6s" repeatCount="indefinite"/>
          </circle>

          <!-- name / role / username -->
          <text x="0" y="150" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Rohit Ram</text>
          <text x="0" y="170" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11.5" fill="#00E5C7">AI &amp; Full Stack Developer</text>
          <text x="0" y="188" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#C9D1D9" opacity="0.85">github.com/RR024</text>

          <line x1="-110.0" y1="205" x2="110.0" y2="205" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

          <!-- barcode -->
          <g transform="translate(-106.0,215)">
            <rect x="0" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="3" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="6" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="9" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="12" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="15" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="18" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="21" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="24" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="27" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="30" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="33" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="36" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="39" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="42" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="45" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="48" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="51" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="54" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="57" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="60" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="63" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="66" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="69" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="72" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="75" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="78" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="81" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="84" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="87" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="90" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="93" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="96" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="99" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="102" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="105" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="108" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="111" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="114" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="117" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="120" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="123" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="126" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="129" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="132" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="135" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="138" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="141" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="144" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="147" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="150" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="153" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="156" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="159" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="162" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="165" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="168" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="171" y="0" width="2.4" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="174" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/><rect x="177" y="0" width="1.6" height="28" fill="#C9D1D9" opacity="0.85"/>
          </g>
          <text x="0" y="262" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#C9D1D9" opacity="0.6">RR024-AI-DEV-2026</text>

          <!-- QR placeholder -->
          <g transform="translate(60.0,210)">
            <rect x="0" y="0" width="48" height="48" rx="4" fill="#0f1c26" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
            <rect x="4" y="4" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="12" y="4" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="20" y="4" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="36" y="4" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="4" y="12" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="20" y="12" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="36" y="12" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="4" y="20" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="20" y="20" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="36" y="20" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="4" y="28" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="20" y="28" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="36" y="28" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="4" y="36" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="20" y="36" width="6" height="6" fill="#C9D1D9" opacity="0.8"/><rect x="36" y="36" width="6" height="6" fill="#C9D1D9" opacity="0.8"/>
          </g>

          <!-- holographic shine sweep -->
          <rect x="-390.0" y="0" width="130.0" height="340" fill="url(#shineSweep)" transform="skewX(-18)">
            <animate attributeName="x" values="-364.0;364.0" dur="3.8s" begin="2s" repeatCount="indefinite"/>
          </rect>
        </g>

        <rect x="-130.0" y="0" width="260" height="340" rx="18" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.4"/>
      </g>
    </g>
  </g>
</svg>