name: Generate Snake Animation

on:
  schedule:
    - cron: "0 2 * * *"   # runs daily at 02:00 UTC
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate-snake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation SVG
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: RR024
          outputs: |
            dist/github-snake.svg?color_snake=#00E5C7,#39FF14&color_dots=#0c1720,#12B886,#00E5C7,#39FF14,#00FFC8
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00E5C7,#39FF14

      - name: Push snake output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
